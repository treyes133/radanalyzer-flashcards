<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found — RadAnalyzer Flashcards</title>
    <link rel="icon" type="image/png" href="alpha_icon_square.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
            background: linear-gradient(135deg, #0f1729 0%, #1b2135 50%, #0f1729 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
        }
        .container {
            text-align: center;
            max-width: 380px;
            padding: 40px 24px;
        }
        .code {
            font-size: 5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #2aa8a4 0%, #43cbc6 50%, #72d8d4 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            margin-bottom: 12px;
        }
        h1 {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 12px;
            color: #fff;
        }
        p {
            color: #99a5bd;
            font-size: 0.9rem;
            line-height: 1.5;
            margin-bottom: 28px;
        }
        a {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 10px 24px;
            background: #2aa8a4;
            color: #fff;
            border-radius: 9999px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.875rem;
            transition: background 0.3s, transform 0.2s;
        }
        a:hover { background: #228a87; transform: translateY(-1px); }
        a:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <div class="container">
        <div class="code">404</div>
        <h1>Page Not Found</h1>
        <p>The page you're looking for doesn't exist or has been moved.</p>
        <a href="/">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
            Back to Flashcards
        </a>
    </div>
</body>
</html>
